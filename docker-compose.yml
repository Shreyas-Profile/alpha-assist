# Paperloft Assist deployment stack — Hetzner.
#
# Same Globalion pattern as telegram-mcp / browser-mcp: unique container
# names (paperloft-assist-*), host port that doesn't collide with other apps
# on the shared box, cloudflared tunnel routes paperloft.regiq.in → this stack.

services:
  db:
    container_name: paperloft-assist-db
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: paperloft_assist
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d paperloft_assist"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    container_name: paperloft-assist-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://admin:admin@db:5432/paperloft_assist
      USERFILES_ROOT: /data/users
    ports:
      - "3016:3000"
    volumes:
      # Per-user files (prescription uploads etc.) — persist across rebuilds.
      - userfiles:/data/users
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  userfiles:
